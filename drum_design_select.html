<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ドラム設計</title>
  <style>
    body { font-family: 'SansSerif', sans-serif; margin: 0; }
    .menubar { display: flex; background: #eee; padding: 8px; }
    .menu { margin-right: 20px; }
    .panel {margin: 40px auto; display: flex; flex-direction: column; align-items: center;}
    .label { font-size: 24px; font-weight: bold; margin-bottom: 20px; text-align: center;}
    .input-row { margin-bottom: 15px; display: flex; align-items: center; }
    .input-row label { width: 180px; }
    .input-row input { width: 150px; font-size: 16px; }
    .btn { font-size: 18px; padding: 6px 24px; }
    .btn{ width: 320px; height: 50px;}
    .btn + .btn { margin-top: 5px; }
    .font { font-family: 'Times New Roman', serif; }
  </style>
</head>
<body>
  <nav class="menubar">
    <div class="menu">
      <button onclick="onFileOpen()">ファイル</button>
    </div>
    <div class="menu">
      <button onclick="onMenuSelect()">メニュー</button>
    </div>
  </nav>
    
<div class="panel">
    <div class="label">ドラム設計項目一覧</div>
    <button class="btn" onclick="onDecide1()">ドラム基本設計</button>
    <button class="btn" onclick="onDecide2()">ワイヤロープ長さ,巻き上げ荷重</button>
    <button class="btn" onclick="onDecide3()">ドラムのフランジ設計</button>
    <button class="btn" onclick="onDecide4()">ワイヤロープ止金具設計</button>
    <button class="btn" onclick="onDecide5()">ドラム取付ボルト設計</button>
  </div>
  <script>

    function onFileOpen() {
      alert('ファイルメニューが押されました');
    }
    function onMenuSelect() {
      alert('メニューが押されました');
    }
    function onDecide1() {
      window.location.href = 'drum_design1.html';
    }
    function onDecide2() {
      window.location.href = 'drum_design2.html';
    }
    function onDecide3() {
      window.location.href = 'drum_design3.html';
    }
    function onDecide4() {
      window.location.href = 'drum_design4.html';
    }
    function onDecide5() {
      window.location.href = 'drum_design5.html';
    }
    function onFileOpen() {
    }
    function onMenuSelect() {
    }
  </script>
